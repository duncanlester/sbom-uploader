version: "3.8"

# Purpose: install a pinned set of Jenkins plugins and expose the resulting
# .jpi files in ./plugins-output/ so they can be scanned with Syft.
#
# Input:  ./plugins-install.txt  (format: "plugin-id:version", one per line)
#         Generated by Jenkinsfile.plugins from the live Jenkins list-plugins output.
#
# Output: ./plugins-output/*.jpi  – the actual installed plugin archives, ready
#         for per-plugin Syft scanning and upload to Dependency-Track.
#
# The container exits (code 0) once installation is complete; there is no
# long-running process, so "docker compose up" returns when the work is done.

services:
  jenkins-plugin-installer:
    image: jenkins/jenkins:lts
    container_name: jenkins-plugin-installer
    # Run as root so we can write into the bind-mounted plugins-output directory
    # regardless of the host directory's ownership.
    user: root
    volumes:
      - ./plugins-install.txt:/tmp/plugins-install.txt:ro
      - ./plugins-output:/var/jenkins_home/plugins
    entrypoint: >
      /bin/bash -c "
        mkdir -p /var/jenkins_home/plugins &&
        echo 'Installing plugins from plugins-install.txt...' &&
        jenkins-plugin-cli --plugin-file /tmp/plugins-install.txt --verbose &&
        echo 'Plugin installation complete.' &&
        ls -1 /var/jenkins_home/plugins/*.jpi /var/jenkins_home/plugins/*.hpi 2>/dev/null | wc -l | xargs -I{} echo 'Installed {} plugin files'
      "
