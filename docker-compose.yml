services:
  postgres:
    container_name: dtrack-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dtrack
      POSTGRES_USER: dtrack
      POSTGRES_PASSWORD: dtrack
    volumes:
      - dtrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dtrack-network
    restart: unless-stopped

  dependency-track-apiserver:
    container_name: dtrack-apiserver
    image: dependencytrack/apiserver:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ALPINE_DATABASE_MODE: external
      ALPINE_DATABASE_URL: jdbc:postgresql://postgres:5432/dtrack
      ALPINE_DATABASE_DRIVER: org.postgresql.Driver
      ALPINE_DATABASE_USERNAME: dtrack
      ALPINE_DATABASE_PASSWORD: dtrack
      ALPINE_OIDC_ENABLED: "false"
    ports:
      - "8081:8080"    # host:container
    volumes:
      - dtrack_apiserver_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://w-work-19.rdmz.isridev.com:8081/api/v1/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - dtrack-network

  dependency-track-frontend:
    container_name: dtrack-frontend
    image: dependencytrack/frontend:latest
    depends_on:
      - dependency-track-apiserver
    environment:
      API_BASE_URL: "http://w-work-19.rdmz.isridev.com:8081"
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://w-work-19.rdmz.isridev.com:8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - dtrack-network

#swagger
  swagger-editor:
    image: swaggerapi/swagger-editor:latest
    depends_on:
      - dependency-track-apiserver
    container_name: swagger-editor
    ports:
      - "8083:8080"
    volumes:
      - swagger:/usr/share/nginx/html/swagger # Mount a local 'swagger' directory
    environment:
      # Optional: set an initial file to load in the editor
      SWAGGER_FILE: /usr/share/nginx/html/swagger/openapi.yaml
    restart: unless-stopped
    networks:
      - dtrack-network

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    depends_on:
      - swagger-editor
    container_name: swagger-ui
    ports:
      - "8084:8080"
    volumes:
      # Mount the same local directory to share spec files
      - swagger:/usr/share/nginx/html/swagger
    environment:
      # Use the editor's file as the default spec for the UI
      SWAGGER_JSON_URL: http://w-work-19.rdmz.isridev.com:8081/api/openapi.yaml
      # Disable validation badge for local use if needed
      VALIDATOR_URL: none
    restart: unless-stopped
    networks:
      - dtrack-network

  # ---------------------------------------------------------------------------
  # One-shot plugin installer — only starts when explicitly requested.
  # Run via: docker compose --profile plugins up jenkins-plugin-installer
  # Input:   ./plugins-install.txt  (id:version format, generated by Jenkinsfile.plugins)
  # Output:  ./plugins-output/*.jpi  (bind-mounted; consumed by Syft in the pipeline)
  # ---------------------------------------------------------------------------
  jenkins-plugin-installer:
    profiles: ["plugins"]
    image: jenkins/jenkins:lts
    container_name: jenkins-plugin-installer
    user: root
    volumes:
      - ./plugins-install.txt:/tmp/plugins-install.txt:ro
      - ./plugins-output:/var/jenkins_home/plugins
    entrypoint: >
      /bin/bash -c "
        mkdir -p /var/jenkins_home/plugins &&
        echo 'Installing plugins from plugins-install.txt...' &&
        jenkins-plugin-cli --plugin-file /tmp/plugins-install.txt --verbose &&
        echo 'Plugin installation complete.' &&
        ls -1 /var/jenkins_home/plugins/*.jpi /var/jenkins_home/plugins/*.hpi 2>/dev/null | wc -l | xargs -I{} echo 'Installed {} plugin files'
      "

secrets:
  admin_password:
    file: ./admin_password

volumes:
  dtrack_postgres_data:
    external: true
  dtrack_apiserver_data:
    external: true
  swagger:
    external: true

networks:
  dtrack-network:
    external: true
