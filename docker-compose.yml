services:
  postgres:
    container_name: dtrack-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dtrack
      POSTGRES_USER: dtrack
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - dtrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dtrack-network
    restart: unless-stopped

  dependency-track-apiserver:
    container_name: dtrack-apiserver
    image: dependencytrack/apiserver:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ALPINE_DATABASE_MODE: external
      ALPINE_DATABASE_URL: jdbc:postgresql://postgres:5432/dtrack
      ALPINE_DATABASE_DRIVER: org.postgresql.Driver
      ALPINE_DATABASE_USERNAME: dtrack
      ALPINE_DATABASE_PASSWORD: "${POSTGRES_PASSWORD}"
      # --- LDAP / Active Directory ---
      ALPINE_LDAP_ENABLED: "true"
      ALPINE_LDAP_SERVER_URL: "${LDAP_SERVER_URL}"
      ALPINE_LDAP_BASEDN: "${LDAP_BASEDN}"
      ALPINE_LDAP_BIND_USERNAME: "${LDAP_BIND_USERNAME}"
      ALPINE_LDAP_BIND_PASSWORD: "${LDAP_BIND_PASSWORD}"
      ALPINE_LDAP_AUTH_USERNAME_FORMAT: "${LDAP_AUTH_USERNAME_FORMAT}"
      ALPINE_LDAP_ATTRIBUTE_NAME: "${LDAP_ATTRIBUTE_NAME}"
      ALPINE_LDAP_ATTRIBUTE_MAIL: "${LDAP_ATTRIBUTE_MAIL}"
      ALPINE_LDAP_GROUPS_BASEDN: "${LDAP_GROUPS_BASEDN}"
      ALPINE_LDAP_GROUPS_FILTER: "${LDAP_GROUPS_FILTER}"
      ALPINE_LDAP_USER_GROUPS_FILTER: "${LDAP_USER_GROUPS_FILTER}"
      ALPINE_LDAP_USER_PROVISIONING: "true"
      ALPINE_LDAP_TEAM_SYNCHRONIZATION: "true"
      ALPINE_OIDC_ENABLED: "false"
    ports:
      - "8081:8080"    # host:container
    volumes:
      - dtrack_apiserver_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/api/v1/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - dtrack-network
  caddy:
    image: caddy:2-alpine
    container_name: dtrack-caddy
    depends_on:
      - dependency-track-frontend
      - dependency-track-apiserver
      - swagger-ui
      - swagger-editor
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro  # Mount your certs directory here
    networks:
      - dtrack-network
    restart: unless-stopped

  dependency-track-frontend:
    container_name: dtrack-frontend
    image: dependencytrack/frontend:latest
    depends_on:
      - dependency-track-apiserver
    environment:
      API_BASE_URL: "http://localhost:8081"
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - dtrack-network

#swagger
  swagger-editor:
    image: swaggerapi/swagger-editor:latest
    depends_on:
      - dependency-track-apiserver
    container_name: swagger-editor
    ports:
      - "8083:8080"
    volumes:
      - swagger:/usr/share/nginx/html/swagger
      - ./watchtower-openapi.yaml:/usr/share/nginx/html/swagger/watchtower.yaml:ro
      - ./dependencytrack-openapi.yaml:/usr/share/nginx/html/swagger/dependencytrack.yaml:ro
      - ./jenkins-openapi.yaml:/usr/share/nginx/html/swagger/jenkins.yaml:ro
    environment:
      # Optional: set an initial file to load in the editor
      SWAGGER_FILE: /usr/share/nginx/html/swagger/openapi.yaml
    restart: unless-stopped
    networks:
      - dtrack-network

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    depends_on:
      - dependency-track-apiserver
    container_name: swagger-ui
    ports:
      - "8084:8080"
    volumes:
      - swagger:/usr/share/nginx/html/swagger
      - ./watchtower-openapi.yaml:/usr/share/nginx/html/swagger/watchtower.yaml:ro
      - ./dependencytrack-openapi.yaml:/usr/share/nginx/html/swagger/dependencytrack.yaml:ro
      - ./jenkins-openapi.yaml:/usr/share/nginx/html/swagger/jenkins.yaml:ro
    environment:
      SWAGGER_JSON_URL: http://localhost:8081/api/openapi.yaml
      VALIDATOR_URL: none
    restart: unless-stopped
    networks:
      - dtrack-network
# to access
# Dependency Track API: http://localhost:8084/swagger/dependencytrack.yaml
# Jenkins API: http://localhost:8084/swagger/jenkins.yaml
# Watchtower API: http://localhost:8084/swagger/watchtower.yaml

secrets:
  admin_password:
    file: ./admin_password
  postgres_password:
    file: ./postgres_password

volumes:
  dtrack_postgres_data:
    external: true
  dtrack_apiserver_data:
    external: true
  swagger:
    external: true

networks:
  dtrack-network:
    external: true

