# Nginx reverse proxy for Dependency Track (frontend + apiserver)
# Place your SSL cert and key at /etc/nginx/certs/fullchain.pem and /etc/nginx/certs/privkey.pem

server {
    listen 443 ssl;
    server_name dtrack.example.com;  # Change to your domain

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy frontend
    location / {
        proxy_pass http://dtrack-frontend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API server
    location /api/ {
        proxy_pass http://dtrack-apiserver:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name dtrack.example.com;
    return 301 https://$host$request_uri;
}
