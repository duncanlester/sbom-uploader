services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-master
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home_data_1:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Duser.home=/var/jenkins_home
    networks:
      - dtrack-network
volumes:
  jenkins_home_data_1:
    external: true

networks:
  dtrack-network:
    external: true
