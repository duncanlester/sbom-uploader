services:
  watchtower:
    image: containrrr/watchtower:1.5.3
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8484:8080
    environment:
      DOCKER_API_VERSION: "1.52"
      WATCHTOWER_SCHEDULE: "0 0 1 * * *"
      WATCHTOWER_CLEANUP: true
      WATCHTOWER_MONITOR_ONLY: true
      WATCHTOWER_NOTIFICATIONS_LEVEL: info
      WATCHTOWER_NOTIFICATIONS_HOSTNAME: "DockerHA"
      TZ: "Australia/Melbourne"
      WATCHTOWER_NO_STARTUP_MESSAGE: true
      WATCHTOWER_HTTP_API_TOKEN: "watchtowertoken"
      # WATCHTOWER_HTTP_API_UPDATE: true
      WATCHTOWER_TIMEOUT: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/update?token=watchtowertoken"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - dtrack-network
volumes:
  watchtower_jenkins_data:
    external: true

networks:
  dtrack-network:
    external: true
# To update all containers immediately: curl -X POST http://localhost:8484/v1/update?token=watchtowertoken

