events {
    worker_connections 1024;
}

http {
    server {
        listen 8090;

        # Add CORS headers to all responses
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Watchtower proxy - route via docker service name
        location /api/watchtower/ {
            proxy_pass http://watchtower:8080/;
            proxy_set_header Host watchtower;
        }

        # Jenkins proxy
        location /api/jenkins/ {
            proxy_pass http://jenkins:8080/;
            proxy_set_header Host jenkins;
        }

        # Dependency Track proxy
        location /api/dtrack/ {
            proxy_pass http://dependency-track-apiserver:8080/;
            proxy_set_header Host dependency-track-apiserver;
        }
    }
}
